<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Simba's Shit Pit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Bangers&family=Patrick+Hand&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0e05;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bangers', cursive;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  #gameWrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 900px;
    max-height: 600px;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    border-radius: 4px;
  }

  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #ui-overlay.active { pointer-events: all; }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 20px;
  }
  .screen.visible { display: flex; }

  .title {
    font-family: 'Bungee Shade', cursive;
    font-size: clamp(28px, 6vw, 56px);
    color: #ffcc00;
    text-shadow: 3px 3px 0 #7a4a1a, 6px 6px 0 rgba(0,0,0,0.4);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .subtitle {
    font-family: 'Patrick Hand', cursive;
    font-size: clamp(14px, 2.5vw, 22px);
    color: #e8c87a;
    margin-bottom: 30px;
    letter-spacing: 1px;
  }

  .btn {
    font-family: 'Bangers', cursive;
    font-size: clamp(20px, 3.5vw, 32px);
    padding: 14px 48px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(180deg, #d4851f 0%, #a85c10 100%);
    box-shadow: 0 6px 0 #6b3a08, 0 8px 20px rgba(0,0,0,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 2px;
    pointer-events: all;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #6b3a08, 0 10px 24px rgba(0,0,0,0.5); }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #6b3a08, 0 4px 10px rgba(0,0,0,0.5); }

  .score-display {
    font-size: clamp(18px, 3vw, 28px);
    color: #ffcc00;
    margin-bottom: 16px;
  }

  .high-score {
    font-size: clamp(13px, 2vw, 18px);
    color: #c89a4a;
    margin-bottom: 24px;
  }

  .instructions {
    font-family: 'Patrick Hand', cursive;
    font-size: clamp(12px, 2vw, 17px);
    color: #c89a4a;
    margin-top: 20px;
    line-height: 1.6;
  }

  #hud {
    position: absolute;
    top: 12px; left: 16px; right: 16px;
    display: none;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
  }
  #hud.visible { display: flex; }

  .hud-item {
    font-size: clamp(16px, 2.8vw, 26px);
    color: #ffcc00;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
    letter-spacing: 1px;
  }

  .emoji-decor {
    font-size: clamp(32px, 5vw, 52px);
    margin-bottom: 6px;
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hud-item" id="hudScore">SCORE: 0</div>
    <div class="hud-item" id="hudSpeed">SPEED: 1x</div>
  </div>

  <div id="ui-overlay" class="active">
    <div class="screen visible" id="startScreen">
      <div class="emoji-decor">🦁</div>
      <div class="title">SIMBA'S<br>SHIT PIT</div>
      <div class="subtitle">Don't fall in the brown zone.</div>
      <button class="btn" id="startBtn">PLAY</button>
      <div class="instructions">
        TAP / SPACE / CLICK to jump<br>
        Hold longer = jump higher
      </div>
    </div>

    <div class="screen" id="gameOverScreen">
      <div class="emoji-decor">💩</div>
      <div class="title" style="font-size:clamp(22px,5vw,44px)">FELL IN<br>THE PIT!</div>
      <div class="score-display" id="finalScore">SCORE: 0</div>
      <div class="high-score" id="highScore">BEST: 0</div>
      <button class="btn" id="retryBtn">RETRY</button>
      <div class="instructions">You lasted <span id="survivalTime">0</span> seconds</div>
    </div>
  </div>
</div>

<script>
// ─── AUDIO ENGINE ────────────────────────────────────────────
const AudioEngine = (() => {
  let ctx;
  const init = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); };

  const play = (freq, type, dur, vol = 0.15) => {
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + dur);
  };

  return {
    init,
    jump: () => { play(320, 'square', 0.12, 0.1); play(480, 'square', 0.1, 0.08); },
    land: () => play(120, 'triangle', 0.08, 0.1),
    score: () => { play(520, 'sine', 0.1, 0.12); setTimeout(() => play(660, 'sine', 0.15, 0.1), 80); },
    fall: () => {
      play(300, 'sawtooth', 0.3, 0.12);
      setTimeout(() => play(180, 'sawtooth', 0.3, 0.1), 100);
      setTimeout(() => play(90, 'sawtooth', 0.5, 0.08), 200);
    },
    splat: () => play(60, 'triangle', 0.4, 0.15),
  };
})();

// ─── GAME ────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const c = canvas.getContext('2d');

const W = 900, H = 600;
canvas.width = W; canvas.height = H;

// State
let state = 'menu'; // menu | playing | dead
let score = 0;
let highScore = parseInt(localStorage.getItem('ssp_high') || '0');
let startTime = 0;
let gameTime = 0;
let speedMultiplier = 1;
let baseSpeed = 4;
let groundY = H - 100;
let cameraX = 0;
let frameCount = 0;

// Simba
const simba = {
  x: 200, y: groundY, w: 44, h: 52,
  vy: 0, onGround: true, jumping: false,
  jumpHeld: false, jumpTimer: 0, maxJumpTime: 14,
  runFrame: 0, runTimer: 0, tailWag: 0, dead: false,
  deathY: 0, deathVY: 0,
};

const GRAVITY = 0.65;
const JUMP_POWER = -11;
const JUMP_HOLD_POWER = -0.55;

// Pits
let pits = [];
let nextPitX = 600;

// Particles
let particles = [];
let dustParticles = [];
let flies = [];
let clouds = [];
let bgHills = [];

// Scored pits tracker
let scoredPits = new Set();

// ─── GENERATION ──────────────────────────────────────────────
function generatePit() {
  const minW = 70;
  const maxW = Math.min(160, 70 + score * 2);
  const w = minW + Math.random() * (maxW - minW);
  const gap = 200 + Math.random() * 180 - Math.min(score * 1.5, 80);
  const pitX = nextPitX + Math.max(gap, 130);

  pits.push({ x: pitX, w, scored: false, id: Math.random() });
  nextPitX = pitX + w;

  // Flies around pit
  for (let i = 0; i < 3; i++) {
    flies.push({
      baseX: pitX + w / 2 + (Math.random() - 0.5) * w * 0.6,
      baseY: groundY - 10 - Math.random() * 30,
      angle: Math.random() * Math.PI * 2,
      radius: 8 + Math.random() * 12,
      speed: 0.03 + Math.random() * 0.04,
      pitId: pits[pits.length - 1].id,
    });
  }
}

function generateCloud() {
  clouds.push({
    x: W + Math.random() * 200,
    y: 30 + Math.random() * 100,
    w: 60 + Math.random() * 100,
    speed: 0.3 + Math.random() * 0.5,
    opacity: 0.15 + Math.random() * 0.15,
  });
}

function generateHill(x) {
  bgHills.push({
    x: x,
    w: 200 + Math.random() * 300,
    h: 40 + Math.random() * 80,
    color: Math.random() > 0.5 ? '#2d5a1e' : '#3a6e28',
  });
}

// ─── INIT ────────────────────────────────────────────────────
function initGame() {
  score = 0;
  speedMultiplier = 1;
  cameraX = 0;
  frameCount = 0;
  startTime = performance.now();

  simba.x = 200; simba.y = groundY; simba.vy = 0;
  simba.onGround = true; simba.jumping = false;
  simba.jumpHeld = false; simba.jumpTimer = 0;
  simba.dead = false; simba.runFrame = 0;

  pits = []; particles = []; dustParticles = [];
  flies = []; scoredPits.clear();
  nextPitX = 500;

  clouds = [];
  bgHills = [];
  for (let i = 0; i < 6; i++) generateCloud();
  clouds.forEach((cl, i) => cl.x = i * (W / 5));
  for (let i = 0; i < 8; i++) generateHill(i * 180);

  for (let i = 0; i < 5; i++) generatePit();
}

// ─── INPUT ───────────────────────────────────────────────────
let inputDown = false;

function onInputDown(e) {
  if (e) e.preventDefault();
  AudioEngine.init();
  inputDown = true;

  if (state === 'playing' && simba.onGround && !simba.dead) {
    simba.vy = JUMP_POWER;
    simba.onGround = false;
    simba.jumping = true;
    simba.jumpHeld = true;
    simba.jumpTimer = 0;
    AudioEngine.jump();
  }
}

function onInputUp(e) {
  if (e) e.preventDefault();
  inputDown = false;
  simba.jumpHeld = false;
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); if (!e.repeat) onInputDown(); }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') onInputUp();
});
canvas.addEventListener('mousedown', onInputDown);
canvas.addEventListener('mouseup', onInputUp);
canvas.addEventListener('touchstart', onInputDown, { passive: false });
canvas.addEventListener('touchend', onInputUp, { passive: false });

// ─── BUTTONS ─────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
  AudioEngine.init();
  state = 'playing';
  document.getElementById('startScreen').classList.remove('visible');
  document.getElementById('ui-overlay').classList.remove('active');
  document.getElementById('hud').classList.add('visible');
  initGame();
});

document.getElementById('retryBtn').addEventListener('click', () => {
  state = 'playing';
  document.getElementById('gameOverScreen').classList.remove('visible');
  document.getElementById('ui-overlay').classList.remove('active');
  document.getElementById('hud').classList.add('visible');
  initGame();
});

// ─── UPDATE ──────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;
  frameCount++;

  const speed = baseSpeed * speedMultiplier;
  gameTime = (performance.now() - startTime) / 1000;

  // Increase speed over time
  speedMultiplier = 1 + Math.floor(gameTime / 10) * 0.15;
  speedMultiplier = Math.min(speedMultiplier, 3.0);

  // Move camera
  cameraX += speed;

  // Variable jump height
  if (simba.jumpHeld && simba.jumping && simba.jumpTimer < simba.maxJumpTime) {
    simba.vy += JUMP_HOLD_POWER;
    simba.jumpTimer++;
  }

  // Gravity
  if (!simba.onGround) {
    simba.vy += GRAVITY;
    simba.y += simba.vy;
  }

  // Ground collision
  if (simba.y >= groundY) {
    // Check if over a pit
    const simbaWorldX = simba.x + cameraX;
    const simbaFeetLeft = simbaWorldX + 8;
    const simbaFeetRight = simbaWorldX + simba.w - 8;
    let overPit = false;

    for (const pit of pits) {
      if (simbaFeetLeft > pit.x + 6 && simbaFeetRight < pit.x + pit.w - 6) {
        overPit = true;
        // DEATH!
        if (!simba.dead) {
          simba.dead = true;
          simba.deathVY = 2;
          AudioEngine.fall();
          setTimeout(() => AudioEngine.splat(), 400);

          // Splat particles
          for (let i = 0; i < 20; i++) {
            particles.push({
              x: simbaWorldX + simba.w / 2,
              y: groundY + 20,
              vx: (Math.random() - 0.5) * 8,
              vy: -Math.random() * 6 - 2,
              life: 60 + Math.random() * 40,
              maxLife: 100,
              size: 4 + Math.random() * 6,
              color: Math.random() > 0.3 ? '#6b4226' : '#4a2d14',
            });
          }

          // Game over after delay
          setTimeout(() => {
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('ssp_high', highScore.toString());
            }
            state = 'dead';
            document.getElementById('finalScore').textContent = `SCORE: ${score}`;
            document.getElementById('highScore').textContent = `BEST: ${highScore}`;
            document.getElementById('survivalTime').textContent = gameTime.toFixed(1);
            document.getElementById('gameOverScreen').classList.add('visible');
            document.getElementById('ui-overlay').classList.add('active');
            document.getElementById('hud').classList.remove('visible');
          }, 800);
        }
        break;
      }
    }

    if (!overPit && !simba.dead) {
      simba.y = groundY;
      if (!simba.onGround) {
        simba.onGround = true;
        simba.jumping = false;
        AudioEngine.land();
        // Landing dust
        for (let i = 0; i < 5; i++) {
          dustParticles.push({
            x: simbaWorldX + simba.w / 2 + (Math.random() - 0.5) * 20,
            y: groundY,
            vx: (Math.random() - 0.5) * 2,
            vy: -Math.random() * 1.5,
            life: 20 + Math.random() * 15,
            maxLife: 35,
            size: 3 + Math.random() * 4,
          });
        }
      }
    }
  }

  // Dead simba falls into pit
  if (simba.dead) {
    simba.deathVY += 0.3;
    simba.y += simba.deathVY;
    return;
  }

  // Score pits passed
  const simbaWorldX = simba.x + cameraX;
  for (const pit of pits) {
    if (!pit.scored && simbaWorldX > pit.x + pit.w) {
      pit.scored = true;
      score++;
      AudioEngine.score();
      // Score popup particles
      for (let i = 0; i < 3; i++) {
        particles.push({
          x: simbaWorldX, y: simba.y - 20,
          vx: (Math.random() - 0.5) * 3,
          vy: -2 - Math.random() * 2,
          life: 40, maxLife: 40, size: 3,
          color: '#ffcc00', type: 'star',
        });
      }
    }
  }

  // Running dust
  if (simba.onGround && frameCount % 6 === 0) {
    dustParticles.push({
      x: simbaWorldX + 5,
      y: groundY,
      vx: -Math.random() * 1.5 - 0.5,
      vy: -Math.random() * 0.8,
      life: 18 + Math.random() * 10,
      maxLife: 28,
      size: 2 + Math.random() * 3,
    });
  }

  // Run animation
  simba.runTimer += speed * 0.15;
  if (simba.runTimer > 1) { simba.runTimer = 0; simba.runFrame = (simba.runFrame + 1) % 4; }
  simba.tailWag += 0.15;

  // Generate more pits
  while (nextPitX < cameraX + W + 400) generatePit();

  // Clean old pits and flies
  pits = pits.filter(p => p.x + p.w > cameraX - 100);
  const activePitIds = new Set(pits.map(p => p.id));
  flies = flies.filter(f => activePitIds.has(f.pitId));

  // Update particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--; });
  particles = particles.filter(p => p.life > 0);
  dustParticles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
  dustParticles = dustParticles.filter(p => p.life > 0);

  // Update clouds
  clouds.forEach(cl => { cl.x -= cl.speed; });
  clouds = clouds.filter(cl => cl.x + cl.w > -50);
  if (clouds.length < 6) generateCloud();

  // Update flies
  flies.forEach(f => { f.angle += f.speed; });

  // Generate hills
  const lastHill = bgHills[bgHills.length - 1];
  if (lastHill && lastHill.x + lastHill.w < cameraX + W + 100) {
    generateHill(lastHill.x + lastHill.w * 0.6 + Math.random() * 100);
  }
  bgHills = bgHills.filter(h => h.x + h.w > cameraX - 200);

  // HUD
  document.getElementById('hudScore').textContent = `SCORE: ${score}`;
  document.getElementById('hudSpeed').textContent = `SPEED: ${speedMultiplier.toFixed(1)}x`;
}

// ─── DRAW ────────────────────────────────────────────────────
function drawSky() {
  const grad = c.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a3a5c');
  grad.addColorStop(0.45, '#d4885e');
  grad.addColorStop(0.65, '#e6a44a');
  grad.addColorStop(1, '#c46830');
  c.fillStyle = grad;
  c.fillRect(0, 0, W, H);

  // Sun
  c.fillStyle = '#ffe080';
  c.globalAlpha = 0.6;
  c.beginPath();
  c.arc(700, 100, 50, 0, Math.PI * 2);
  c.fill();
  c.globalAlpha = 0.2;
  c.beginPath();
  c.arc(700, 100, 70, 0, Math.PI * 2);
  c.fill();
  c.globalAlpha = 1;
}

function drawClouds() {
  clouds.forEach(cl => {
    c.fillStyle = `rgba(255,255,255,${cl.opacity})`;
    c.beginPath();
    c.ellipse(cl.x, cl.y, cl.w / 2, 16, 0, 0, Math.PI * 2);
    c.fill();
    c.beginPath();
    c.ellipse(cl.x - cl.w * 0.2, cl.y + 5, cl.w * 0.3, 12, 0, 0, Math.PI * 2);
    c.fill();
    c.beginPath();
    c.ellipse(cl.x + cl.w * 0.25, cl.y + 3, cl.w * 0.25, 10, 0, 0, Math.PI * 2);
    c.fill();
  });
}

function drawHills() {
  bgHills.forEach(h => {
    const sx = h.x - cameraX * 0.3;
    c.fillStyle = h.color;
    c.beginPath();
    c.moveTo(sx, groundY + 10);
    c.quadraticCurveTo(sx + h.w / 2, groundY + 10 - h.h, sx + h.w, groundY + 10);
    c.fill();
  });
}

function drawGround() {
  // Ground body
  c.fillStyle = '#5a8a3a';
  c.fillRect(0, groundY, W, H - groundY);

  // Grass fringe
  const grassOffset = (cameraX * 0.5) % 12;
  c.fillStyle = '#6ea844';
  for (let x = -grassOffset; x < W + 12; x += 12) {
    c.beginPath();
    c.moveTo(x, groundY);
    c.lineTo(x + 6, groundY - 8);
    c.lineTo(x + 12, groundY);
    c.fill();
  }

  // Dirt layer
  c.fillStyle = '#8b6934';
  c.fillRect(0, groundY + 20, W, H - groundY - 20);
  c.fillStyle = '#6b4d28';
  c.fillRect(0, groundY + 50, W, H - groundY - 50);
}

function drawPits() {
  pits.forEach(pit => {
    const sx = pit.x - cameraX;
    if (sx > W + 10 || sx + pit.w < -10) return;

    // Cut ground  - draw pit hole
    c.fillStyle = '#2a1508';
    c.fillRect(sx, groundY - 4, pit.w, H - groundY + 4);

    // Brown "contents"
    const fillH = 40;
    const fillY = H - fillH - 20;
    c.fillStyle = '#5c3a1a';
    c.fillRect(sx + 4, fillY, pit.w - 8, fillH);

    // Darker splotches
    c.fillStyle = '#4a2d14';
    for (let i = 0; i < 3; i++) {
      const bx = sx + 10 + (i * (pit.w - 20) / 3);
      const by = fillY + 5 + Math.sin(i * 2.5 + frameCount * 0.02) * 4;
      c.beginPath();
      c.ellipse(bx, by + 15, 8 + i * 2, 6, 0, 0, Math.PI * 2);
      c.fill();
    }

    // Bubbles
    c.fillStyle = '#6b4226';
    const bubbleT = frameCount * 0.05;
    for (let i = 0; i < 2; i++) {
      const bx2 = sx + pit.w * 0.3 + i * pit.w * 0.4;
      const by2 = fillY + 8 - Math.abs(Math.sin(bubbleT + i * 1.8)) * 6;
      const br = 3 + Math.sin(bubbleT + i) * 1.5;
      if (br > 1) {
        c.beginPath();
        c.arc(bx2, by2, br, 0, Math.PI * 2);
        c.fill();
      }
    }

    // Stink lines
    c.strokeStyle = 'rgba(120, 180, 60, 0.35)';
    c.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
      const lx = sx + pit.w * 0.25 + i * pit.w * 0.25;
      const lt = frameCount * 0.04 + i * 1.2;
      const ly = groundY - 10 - Math.sin(lt) * 15 - 10;
      c.beginPath();
      c.moveTo(lx, groundY - 2);
      c.quadraticCurveTo(lx + Math.sin(lt) * 8, ly + 10, lx + Math.sin(lt + 1) * 5, ly);
      c.stroke();
    }

    // Pit edges
    c.fillStyle = '#3a2510';
    c.fillRect(sx - 3, groundY - 4, 6, H - groundY + 4);
    c.fillRect(sx + pit.w - 3, groundY - 4, 6, H - groundY + 4);
  });
}

function drawFlies() {
  flies.forEach(f => {
    const fx = f.baseX - cameraX + Math.cos(f.angle) * f.radius;
    const fy = f.baseY + Math.sin(f.angle * 1.7) * f.radius * 0.6;
    if (fx < -20 || fx > W + 20) return;
    c.fillStyle = '#222';
    c.beginPath();
    c.arc(fx, fy, 1.5, 0, Math.PI * 2);
    c.fill();
    // Wings
    c.fillStyle = 'rgba(200,200,200,0.5)';
    c.beginPath();
    c.ellipse(fx - 2, fy - 1.5, 2, 1, -0.5, 0, Math.PI * 2);
    c.fill();
    c.beginPath();
    c.ellipse(fx + 2, fy - 1.5, 2, 1, 0.5, 0, Math.PI * 2);
    c.fill();
  });
}

function drawSimba() {
  const sx = simba.x;
  const sy = simba.y;

  if (simba.dead && sy > H + 80) return;

  c.save();
  c.translate(sx + simba.w / 2, sy);

  // Bounce when running
  const bounce = simba.onGround ? Math.abs(Math.sin(simba.runTimer * Math.PI)) * 3 : 0;
  c.translate(0, -bounce);

  // Body tilt during jump
  if (!simba.onGround && !simba.dead) {
    const tilt = Math.max(-0.3, Math.min(0.15, simba.vy * 0.02));
    c.rotate(tilt);
  }
  if (simba.dead) {
    c.rotate(frameCount * 0.1);
  }

  // Tail
  c.strokeStyle = '#c8943c';
  c.lineWidth = 3;
  c.lineCap = 'round';
  const tailX = -18;
  const tailSwing = Math.sin(simba.tailWag) * 8;
  c.beginPath();
  c.moveTo(tailX, -20);
  c.quadraticCurveTo(tailX - 12, -30 + tailSwing, tailX - 8, -38 + tailSwing);
  c.stroke();
  // Tail tuft
  c.fillStyle = '#7a4a1a';
  c.beginPath();
  c.arc(tailX - 8, -38 + tailSwing, 4, 0, Math.PI * 2);
  c.fill();

  // Back legs
  const legPhase = simba.onGround ? simba.runFrame : 1;
  c.fillStyle = '#c8943c';
  // Back leg
  const bl1 = legPhase === 0 || legPhase === 2 ? -4 : 4;
  c.fillRect(-12, -8 + bl1, 7, 12 - bl1);
  c.fillRect(-6, -8 + bl1, 7, 12 - bl1);

  // Body
  c.fillStyle = '#daa84a';
  c.beginPath();
  c.ellipse(0, -22, 20, 14, 0, 0, Math.PI * 2);
  c.fill();

  // Belly
  c.fillStyle = '#f0d080';
  c.beginPath();
  c.ellipse(2, -18, 12, 8, 0.1, 0, Math.PI * 2);
  c.fill();

  // Front legs
  const fl1 = legPhase === 1 || legPhase === 3 ? -4 : 4;
  c.fillStyle = '#daa84a';
  c.fillRect(8, -8 + fl1, 7, 12 - fl1);
  c.fillRect(14, -8 + fl1, 7, 12 - fl1);

  // Paws
  c.fillStyle = '#c8943c';
  const pawY1 = -8 + (12 - bl1) + bl1 - 2;
  c.fillRect(-13, pawY1, 9, 4);
  const pawY2 = -8 + (12 - fl1) + fl1 - 2;
  c.fillRect(7, pawY2, 9, 4);

  // Mane
  c.fillStyle = '#a86420';
  c.beginPath();
  c.arc(14, -34, 16, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#c87830';
  c.beginPath();
  c.arc(14, -34, 12, 0, Math.PI * 2);
  c.fill();

  // Head
  c.fillStyle = '#daa84a';
  c.beginPath();
  c.arc(16, -34, 10, 0, Math.PI * 2);
  c.fill();

  // Ears
  c.fillStyle = '#c8943c';
  c.beginPath();
  c.arc(10, -44, 5, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.arc(22, -44, 5, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#e8b870';
  c.beginPath();
  c.arc(10, -44, 3, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.arc(22, -44, 3, 0, Math.PI * 2);
  c.fill();

  // Snout
  c.fillStyle = '#f0d080';
  c.beginPath();
  c.ellipse(22, -31, 6, 5, 0, 0, Math.PI * 2);
  c.fill();

  // Eyes
  c.fillStyle = '#222';
  c.beginPath();
  c.arc(14, -36, 2.5, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.arc(22, -36, 2.5, 0, Math.PI * 2);
  c.fill();
  // Eye shine
  c.fillStyle = '#fff';
  c.beginPath();
  c.arc(14.8, -37, 1, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.arc(22.8, -37, 1, 0, Math.PI * 2);
  c.fill();

  // Nose
  c.fillStyle = '#4a2a10';
  c.beginPath();
  c.ellipse(25, -33, 2.5, 2, 0, 0, Math.PI * 2);
  c.fill();

  // Mouth
  if (simba.dead) {
    c.strokeStyle = '#4a2a10';
    c.lineWidth = 1.5;
    c.beginPath();
    c.arc(24, -29, 3, 0, Math.PI);
    c.stroke();
  } else if (!simba.onGround) {
    // Open mouth when jumping
    c.fillStyle = '#c44';
    c.beginPath();
    c.arc(24, -28, 3, 0, Math.PI);
    c.fill();
  }

  c.restore();
}

function drawParticles() {
  particles.forEach(p => {
    const sx = p.x - cameraX;
    const alpha = p.life / p.maxLife;
    if (p.type === 'star') {
      c.fillStyle = `rgba(255, 204, 0, ${alpha})`;
      c.beginPath();
      c.arc(sx, p.y, p.size, 0, Math.PI * 2);
      c.fill();
    } else {
      c.fillStyle = p.color;
      c.globalAlpha = alpha;
      c.beginPath();
      c.arc(sx, p.y, p.size, 0, Math.PI * 2);
      c.fill();
      c.globalAlpha = 1;
    }
  });

  dustParticles.forEach(p => {
    const sx = p.x - cameraX;
    const alpha = (p.life / p.maxLife) * 0.5;
    c.fillStyle = `rgba(180, 160, 120, ${alpha})`;
    c.beginPath();
    c.arc(sx, p.y, p.size, 0, Math.PI * 2);
    c.fill();
  });
}

function drawScorePopups() {
  // Already handled via particles
}

function draw() {
  c.clearRect(0, 0, W, H);
  drawSky();
  drawClouds();
  drawHills();
  drawGround();
  drawPits();
  drawFlies();
  drawParticles();
  drawSimba();

  if (state === 'menu') {
    // Dim overlay
    c.fillStyle = 'rgba(20, 10, 5, 0.55)';
    c.fillRect(0, 0, W, H);
  }
}

// ─── LOOP ────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
